name: Deploy to FastComet

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      
      - name: Build project
        run: npm run build
      
      - name: Install SFTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to FastComet via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          LFTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          set -euo pipefail
          sftp_port="${FTP_PORT:-22}"
          lftp \
            --env-password \
            -p "$sftp_port" \
            -u "$FTP_USERNAME" \
            "sftp://$FTP_SERVER" \
            -e "set cmd:fail-exit yes; set net:timeout 30; set net:max-retries 2; set sftp:auto-confirm yes; mirror --reverse --delete --verbose ./out/ /starlab.ai.kr/; bye"
